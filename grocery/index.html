<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grocery Shop</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
      :root { --bg: #0b1020; --card: #141a2f; --muted: #a6adbb; --text: #e6e8ee; --accent: #70e1a1; }
      * { box-sizing: border-box; }
      html, body { height: 100%; }
      body { margin: 0; font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, "Apple Color Emoji", "Segoe UI Emoji"; background: radial-gradient(80% 80% at 50% 0%, #152040 0%, var(--bg) 50%, #090e1a 100%); color: var(--text); }
      .container { max-width: 1100px; margin: 0 auto; padding: 24px 20px 56px; }
      header { display: flex; align-items: center; justify-content: space-between; gap: 16px; margin-bottom: 24px; }
      .brand { display: flex; align-items: center; gap: 12px; font-weight: 700; letter-spacing: 0.3px; }
      .brand .logo { width: 36px; height: 36px; border-radius: 8px; background: linear-gradient(135deg, #66ffa6, #36c5f0); display: grid; place-items: center; color: #09101c; font-weight: 800; }
      .muted { color: var(--muted); }
      .grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 16px; }
      @media (max-width: 1200px) { .grid { grid-template-columns: repeat(4, 1fr); } }
      @media (max-width: 900px) { .grid { grid-template-columns: repeat(3, 1fr); } }
      @media (max-width: 640px) { .grid { grid-template-columns: repeat(2, 1fr); } }
      .card { background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.02)); border: 1px solid rgba(255,255,255,0.06); border-radius: 14px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.25); transition: transform 160ms ease, box-shadow 160ms ease, border-color 160ms ease; }
      .card:hover { transform: translateY(-4px); box-shadow: 0 16px 40px rgba(0,0,0,0.35); border-color: rgba(255,255,255,0.12); }
      .image-wrap { aspect-ratio: 1 / 1; background: #0f1629; display: grid; place-items: center; }
      .image-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
      .content { padding: 12px; display: grid; gap: 6px; }
      .title { font-weight: 600; font-size: 14px; line-height: 1.3; }
      .price { font-weight: 700; color: var(--accent); }
      .footer { display: flex; justify-content: space-between; align-items: center; }
      .btn { background: #1b2342; border: 1px solid rgba(255,255,255,0.08); color: var(--text); padding: 8px 10px; border-radius: 10px; font-size: 12px; cursor: pointer; transition: all 160ms ease; }
      .btn:hover { background: #1f2950; border-color: rgba(255,255,255,0.14); }
    </style>
  </head>
  <body>
    <div id="app" class="container">
      <header>
        <div class="brand">
          <div class="logo">G</div>
          <div>
            <div>Grocery Show</div>
            <div class="muted" style="font-size:12px">Fresh picks, great prices</div>
          </div>
        </div>
        <div class="muted">Vue.js (CDN) demo</div>
      </header>

      <div class="grid">
        <div class="card" v-for="item in items" :key="item.id">
          <div class="image-wrap">
            <img :src="item.image" :alt="item.name" loading="lazy" />
          </div>
          <div class="content">
            <div class="title">{{ item.name }}</div>
            <div class="footer">
              <div class="price">${{ item.price.toFixed(2) }}</div>
              <button class="btn" @click="addToCart(item)">Add</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Vue 3 via CDN -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script>
      const { createApp } = Vue;
      createApp({
        data() {
          return {
            items: [
              { id: 1, name: 'Bananas', price: 0.79, image: 'https://images.unsplash.com/photo-1571772805064-207c8435df79?q=80&w=800&auto=format&fit=crop' },
              { id: 2, name: 'Apples', price: 1.29, image: 'https://images.unsplash.com/photo-1567306226416-28f0efdc88ce?q=80&w=800&auto=format&fit=crop' },
              { id: 3, name: 'Tomatoes', price: 1.99, image: 'https://images.unsplash.com/photo-1546470427-0fd5c9f337b6?q=80&w=800&auto=format&fit=crop' },
              { id: 4, name: 'Milk', price: 2.49, image: 'https://images.unsplash.com/photo-1582719478250-c89cae4dc85b?q=80&w=800&auto=format&fit=crop' },
              { id: 5, name: 'Bread', price: 2.19, image: 'https://images.unsplash.com/photo-1549931319-a545dcf3bc73?q=80&w=800&auto=format&fit=crop' },
              { id: 6, name: 'Broccoli', price: 1.59, image: 'https://images.unsplash.com/photo-1542831371-d531d36971e6?q=80&w=800&auto=format&fit=crop' },
            ],
          };
        },
        methods: {
          addToCart(item) {
            alert(`Added ${item.name}`);
          },
        },
      }).mount('#app');
    </script>
  </body>
  </html>
