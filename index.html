<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Image Gallery with Prices</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./styles.css" />
    <meta name="description" content="A simple image gallery with price tags built with vanilla JS." />
</head>
<body>
    <header class="site-header">
        <h1>Shop the Gallery</h1>
        <div class="search">
            <input id="searchInput" type="text" placeholder="Search products..." aria-label="Search products" />
        </div>
    </header>

    <main>
        <div id="gallery" class="gallery" aria-live="polite"></div>
    </main>

    <footer class="site-footer">
        <span>Built with vanilla JS</span>
    </footer>

    <script src="./script.js"></script>
    
</body>
</html>
